# ==========================================
# 每周产品经理视角迭代任务配置
# 执行时间：每周日 05:00
# ==========================================

name: weekly-pm-iteration
description: 每周日自动执行产品分析与 UI 优化
trigger: scheduled
schedule:
  day_of_week: "0"  # 周日
  time: "05:00"
  timezone: "Asia/Shanghai"

tasks:
  # ==================== 产品经理视角任务 ====================
  - name: competitive-analysis
    description: |
      1. 搜索同类主流产品（如 Canva 简历、LinkedIn、Resume.com、超级简历等）
      2. 分析其核心功能亮点和用户体验设计
      3. 对比当前项目，识别功能差距
      4. 生成竞品分析报告到 reports/competitive-analysis.md

  - name: product-planning
    description: |
      1. 基于竞品分析，提出功能优化建议
      2. 按用户价值和实现难度进行优先级排序（P0/P1/P2）
      3. 生成产品待办列表到 reports/product-backlog.md
      4. 标记 P0 级 UI 优化任务

  # ==================== UI/UX 优化任务（直接执行）====================
  - name: ui-ux-improvement
    description: |
      1. 检查当前 UI 组件的一致性和可用性问题
      2. 对比主流设计风格（Material Design、Apple HIG 等）
      3. **直接执行** P0 优先级的 UI 改进
      4. 记录修改到 reports/ui-changelog.md

  # ==================== 生成修改摘要 ====================
  - name: generate-summary
    description: |
      1. 汇总本周代码变更
      2. 生成 UI 修改摘要报告
      3. 输出到 reports/weekly-summary.md

# 执行规则
execution_rules:
  # 直接执行的任务（无需批准）
  auto_execute:
    - ui-ux-improvement
    - generate-summary

  # 需要批准的任务
  require_approval:
    - feature-iteration
    - refactor-pass
    - code-review
    - test-runner

completion_criteria:
  - reports_generated: true
  - ui_changes_committed: true

rollback_on_failure: true
notification:
  method: file
  path: reports/weekly-summary.md
